services:
  # ── PostgreSQL 17 ──────────────────────────────────────────────
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: paperclip
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    # ── Hardening ──
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
      - /run/postgresql
    networks:
      - paperclip

  # ── Paperclip Server ───────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: Dockerfile
    init: true
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@db:5432/paperclip
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      NODE_ENV: production
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?Generate with: openssl rand -hex 32}"
      # API keys for AI agents (optional)
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      OPENAI_API_KEY: "${OPENAI_API_KEY:-}"
      # Subscription auth for Claude Code CLI (claude_local adapter)
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN:-}"
      # GitHub App (aerolab-ai[bot]) credentials for git auth
      GH_APP_ID: "${GH_APP_ID:-}"
      GH_APP_INSTALLATION_ID: "${GH_APP_INSTALLATION_ID:-}"
      GH_APP_KEY_B64: "${GH_APP_KEY_B64:-}"
      # Comma-separated repos auto-cloned into /paperclip/workspace on boot
      WORKSPACE_REPOS: "${WORKSPACE_REPOS:-}"
      # Aerolab: bot token + default channel for the `slack-notify` helper that
      # lets agents proactively message Slack.
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN:-}"
      SLACK_DEFAULT_CHANNEL: "${SLACK_DEFAULT_CHANNEL:-}"
    volumes:
      - ./data/paperclip:/paperclip
    depends_on:
      db:
        condition: service_healthy
    # ── Hardening (agents need full filesystem & process access) ──
    security_opt:
      - no-new-privileges:true
    pids_limit: 4096
    shm_size: 256m
    tmpfs:
      - /tmp:size=1g
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - paperclip

networks:
  paperclip:
    driver: bridge

